# Terraform Provider testing workflow.
name: Tests

# This GitHub action runs your tests for each pull request and push.
# Optionally, you can turn it on using a schedule for regular testing.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: github-hosted-small
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@f6091c0113d1dcf9b98e269ee48e8a7e51b7bdd4 # v3.28.5
        with:
          languages: go
          build-mode: manual # go build must be run between this step and the analysis step
          queries: security-extended,security-and-quality
      - run: go mod download
      - run: go build -v .
      - run: go vet ./...
      - run: go tool staticcheck ./...
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f6091c0113d1dcf9b98e269ee48e8a7e51b7bdd4 # v3.28.5
        with:
          category: "/language:go"
      - name: Archive Build
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: build
          path: |
            terraform-provider-quicknode

  pr-scan:
    uses: circlefin/circle-public-github-workflows/.github/workflows/pr-scan.yaml@v1

  trivy-scan:
    name: Trivy Scan
    runs-on: github-hosted-small
    permissions:
      actions: read
      contents: read
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    # setup-trivy's install.sh downloads from get.trivy.dev; some runners cannot resolve it (curl exit 6).
    - name: Install Trivy from GitHub releases
      shell: bash
      env:
        TRIVY_VERSION: '0.69.3'
        RUNNER_ARCH: ${{ runner.arch }}
      run: |
        set -euo pipefail
        case "$RUNNER_ARCH" in
          X64)   suffix='Linux-64bit' ;;
          ARM64) suffix='Linux-ARM64' ;;
          *) echo "unsupported runner.arch=$RUNNER_ARCH"; exit 1 ;;
        esac
        ver="v${TRIVY_VERSION}"
        name="trivy_${TRIVY_VERSION}_${suffix}.tar.gz"
        curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/${ver}/${name}" -o trivy.tgz
        tar -xzf trivy.tgz trivy
        mkdir -p "$HOME/bin"
        install -m 0755 trivy "$HOME/bin/trivy"
        echo "$HOME/bin" >> "$GITHUB_PATH"
        rm -f trivy trivy.tgz
    # Without GitHub Advanced Security (code scanning), upload-sarif has nowhere useful in the UI.
    # scanners=vuln: dependency CVEs only (secret scanner often false-positives on fixtures/docs).
    # exit-code=0: do not block merges; review SARIF artifact + job summary instead.
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      with:
        skip-setup-trivy: true
        version: v0.69.3
        scan-type: fs
        scan-ref: '.'
        scanners: vuln
        exit-code: '0'
        output: trivy-results.sarif
        format: sarif
    - name: Upload Trivy SARIF artifact
      if: always()
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
      with:
        name: trivy-results
        path: trivy-results.sarif
        if-no-files-found: warn
    - name: Trivy table (job summary)
      if: always()
      shell: bash
      run: |
        {
          echo '### Trivy filesystem scan (vulnerabilities only)'
          echo ''
          echo 'Download **trivy-results** artifact for full SARIF.'
          echo ''
          echo '```'
          trivy fs --scanners vuln --format table --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --exit-code 0 .
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

  generate:
    runs-on: github-hosted-small
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
      - run: make generate
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference in directories after code generation. Run 'make generate' command and commit."; exit 1)
      - name: setup goreleaser
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          install-only: true
      - run: make validate

  test:
    name: Terraform Provider Unit Tests
    needs: build
    runs-on: github-hosted-small
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go test -v -cover ./... -run Test -skip TestAcc

  # Run acceptance tests in a matrix with Terraform CLI versions
  acctest:
    # skip when triggered by dependabot, due to no access to secrets
    if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
    name: Terraform Provider Acceptance Tests
    needs: build
    runs-on: github-hosted-small
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # list whatever Terraform versions here you would like to support
        terraform:
          - '1.8.*'
          - '1.9.*'
          - '1.10.*'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - run: go mod download
      - env:
          TF_ACC: "1"
          QUICKNODE_APIKEY: ${{ secrets.QUICKNODE_APIKEY }}
        run: go test -v -cover ./... -run TestAcc
        timeout-minutes: 10

  rollup:
    name: Success Rollup
    if: always()
    needs:
    - build
    - pr-scan
    - trivy-scan
    - generate
    - test
    - acctest
    runs-on: github-hosted-small
    permissions: {}
    steps:
    - run: exit 1
      if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
